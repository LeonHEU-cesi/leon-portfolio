name: Deploy Production

# Déploiement prod sur push `main` (release develop->main) ou tag `v*`.
# Gardé : no-op propre si les secrets ne sont pas configurés (VM/credentials
# = côté Léon, #7.5/#7.6). Non requis par la branch protection.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production (serveur cible)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Vérifier la configuration de déploiement
        id: gate
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
        run: |
          if [ -z "$PROD_SSH_HOST" ]; then
            echo "Secrets de déploiement absents — prod non configurée."
            echo "Voir Docs/claude/leon-portfolio/deploiement-prod.md"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Déploiement SSH (backup + compose up --build + migrate)
        if: steps.gate.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" \
            'cd /opt/leon-portfolio \
              && bash infra/scripts/pg_backup.sh \
              && git pull --ff-only origin main \
              && docker compose -f infra/docker-compose.prod.yml up -d --build \
              && docker compose -f infra/docker-compose.prod.yml exec -T web npx prisma migrate deploy'

      - name: Smoke tests post-déploiement
        if: steps.gate.outputs.configured == 'true'
        working-directory: web
        env:
          SMOKE_BASE_URL: https://leonheu.fr
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:smoke
