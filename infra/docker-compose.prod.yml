# Stack production : web Next + Postgres + Caddy.
# Déploiement : voir Docs/claude/leon-portfolio/deploiement-prod.md
# Lancement : docker compose -f infra/docker-compose.prod.yml up -d --build
#
# Toutes les variables sensibles sont obligatoires (`:?`) — aucun défaut en
# prod, aucune valeur réelle dans ce dépôt (cf. infra/.env hors versionnement).

services:
  postgres:
    image: postgres:16-alpine
    container_name: leon-portfolio-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?obligatoire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?obligatoire}
      POSTGRES_DB: ${POSTGRES_DB:?obligatoire}
    volumes:
      - postgres-prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?obligatoire}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: leon-portfolio-web-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?obligatoire}
      AUTH_SECRET: ${AUTH_SECRET:?obligatoire}
      NEXT_PUBLIC_SITE_URL: https://leonheu.fr
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?obligatoire}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?obligatoire}
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: leon-portfolio-caddy-prod
    restart: unless-stopped
    environment:
      # E-mail ACME lu par le Caddyfile ({$ACME_EMAIL}) — jamais en dur.
      ACME_EMAIL: ${ACME_EMAIL:?obligatoire}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    depends_on:
      - web

volumes:
  postgres-prod:
  caddy-data:
  caddy-config:
  caddy-logs:
