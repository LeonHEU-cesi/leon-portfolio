# Stack dev local : Postgres + Adminer
# Lancement : docker compose -f infra/docker-compose.dev.yml up -d
# Arrêt : docker compose -f infra/docker-compose.dev.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: leon-portfolio-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leonportfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: leon-portfolio-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
